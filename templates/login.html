<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Transport ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { height: 100vh; overflow: hidden; }
        .bg-image {
            background: url('https://images.unsplash.com/photo-1570125909232-eb263c188f7e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center;
            background-size: cover;
            position: relative;
        }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .login-section { display: flex; align-items: center; justify-content: center; background: #f8f9fa; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; }
        .brand-text { font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100">
            <div class="col-md-7 bg-image d-none d-md-block">
                <div class="bg-overlay d-flex flex-column justify-content-center align-items-center text-white text-center p-5">
                    <h1 class="display-4 fw-bold">Smart Campus Transport</h1>
                    <p class="lead">Next-Gen ERP Solution for Fleet Management & Student Safety</p>
                </div>
            </div>
            <div class="col-md-5 login-section">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <i class="fas fa-bus-alt fa-3x text-primary mb-3"></i>
                        <h3 class="brand-text">Welcome Back</h3>
                        <p class="text-muted">Sign in to your account</p>
                    </div>
                    <form method="POST" action="/login">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                            <label for="username">Username / ID</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">LOGIN</button>
                    </form>
                    {% if error %}
                    <div class="alert alert-danger mt-3 d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
                    </div>
                    {% endif %}
                    <div class="text-center mt-4">
                        <small class="text-muted">&copy; 2024 Campus Transport ERP</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
